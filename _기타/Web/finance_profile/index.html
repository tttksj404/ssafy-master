<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기본 정보 수정 | 금융 상품 비교 서비스</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <h1>금융 상품 비교 서비스</h1>
    <nav>
      <a class="nav-link active" href="./index.html">기본 정보 수정</a>
      <a class="nav-link" href="./portfolio.html">포트폴리오 수정</a>
    </nav>
  </header>

  <main class="page">
    <section class="card profile-layout">
      <div class="profile-photo-section">
        <h2>프로필</h2>
        <img
          class="avatar"
          src="https://placehold.co/220x220/png?text=PROFILE"
          alt="회원 프로필 사진"
        >
      </div>

      <div class="bio-section">
        <h2>자기소개</h2>
        <label class="field-label" for="intro">소개 글</label>
        <textarea id="intro" rows="7" placeholder="자기소개를 입력하세요."></textarea>
        <button type="button" class="btn-primary">자기소개 저장</button>
      </div>

      <div class="invest-section">
        <h2>투자 성향</h2>
        <label class="field-label" for="risk-type">위험 선호도</label>
        <select id="risk-type">
          <option>안정형</option>
          <option>안정추구형</option>
          <option>위험중립형</option>
          <option>적극투자형</option>
          <option>공격투자형</option>
        </select>

        <fieldset>
          <legend>선호 금융 상품 (복수 선택)</legend>
          <label><input type="checkbox" name="product" checked> 예금</label>
          <label><input type="checkbox" name="product"> 적금</label>
          <label><input type="checkbox" name="product" checked> ETF</label>
          <label><input type="checkbox" name="product"> 채권</label>
          <label><input type="checkbox" name="product"> 연금</label>
        </fieldset>

        <fieldset>
          <legend>투자 스타일 (단일 선택)</legend>
          <label><input type="radio" name="style" checked> 장기 투자</label>
          <label><input type="radio" name="style"> 단기 투자</label>
          <label><input type="radio" name="style"> 배당 중심</label>
        </fieldset>
      </div>
    </section>

    <section class="card">
      <h2>회원 기본 정보</h2>
      <form class="form-grid">
        <label>회원 번호
          <input type="text" value="1000234" readonly>
        </label>
        <label>ID
          <input type="text" value="ssafy_user15" readonly>
        </label>
        <label>Email
          <input type="email" placeholder="example@email.com" required>
        </label>
        <label>Nickname
          <input type="text" placeholder="닉네임 입력" required>
        </label>
        <label>나이
          <input type="number" min="0" max="120" placeholder="나이 입력">
        </label>
        <label>자산과 연봉
          <input type="number" min="0" step="100" placeholder="현재 자산을 입력해주세요">
          <input type="number" min="0" step="100" placeholder="연봉을 입력해주세요">
        </label>

      </form>
      <div class="actions">
        <button type="button" class="btn-primary">회원 정보 저장</button>
      </div>
    </section>
  </main>
</body>
</html>
